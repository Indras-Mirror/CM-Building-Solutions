<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D2B48F"/>
      <stop offset="50%" style="stop-color:#936C4F"/>
      <stop offset="100%" style="stop-color:#775945"/>
    </linearGradient>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7A441E"/>
      <stop offset="100%" style="stop-color:#6C3514"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="150" cy="150" r="145" fill="url(#darkBg)"/>
  <circle cx="150" cy="150" r="145" fill="none" stroke="#915427" stroke-width="3"/>

  <!-- House shape -->
  <g transform="translate(150, 95)">
    <!-- Roof -->
    <path d="M-50 20 L0 -30 L50 20" fill="none" stroke="#D2B48F" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- House body -->
    <path d="M-40 20 L-40 55 L40 55 L40 20" fill="none" stroke="#D2B48F" stroke-width="5" stroke-linejoin="round"/>

    <!-- Door -->
    <rect x="-12" y="30" width="24" height="25" fill="none" stroke="#D2B48F" stroke-width="3" rx="2"/>
    <circle cx="7" cy="44" r="2" fill="#D2B48F"/>

    <!-- Windows -->
    <rect x="-35" y="28" width="15" height="15" fill="none" stroke="#D2B48F" stroke-width="2"/>
    <rect x="20" y="28" width="15" height="15" fill="none" stroke="#D2B48F" stroke-width="2"/>
    <line x1="-27.5" y1="28" x2="-27.5" y2="43" stroke="#D2B48F" stroke-width="1"/>
    <line x1="-35" y1="35.5" x2="-20" y2="35.5" stroke="#D2B48F" stroke-width="1"/>
    <line x1="27.5" y1="28" x2="27.5" y2="43" stroke="#D2B48F" stroke-width="1"/>
    <line x1="20" y1="35.5" x2="35" y2="35.5" stroke="#D2B48F" stroke-width="1"/>

    <!-- Tool accent on roof (hammer silhouette) -->
    <path d="M-5 -25 L5 -25 L5 -35 L-5 -35 Z" fill="#D2B48F" opacity="0.6"/>
    <rect x="-2" y="-45" width="4" height="12" fill="#D2B48F" opacity="0.6"/>
  </g>

  <!-- C&M Text -->
  <text x="150" y="195" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#D2B48F" text-anchor="middle" letter-spacing="8">C&amp;M</text>

  <!-- Building Solutions Text -->
  <text x="150" y="225" font-family="Arial, sans-serif" font-size="16" fill="#936C4F" text-anchor="middle" letter-spacing="4">BUILDING SOLUTIONS</text>

  <!-- Decorative line under text -->
  <line x1="70" y1="240" x2="230" y2="240" stroke="#915427" stroke-width="1"/>

  <!-- Small decorative elements -->
  <circle cx="60" cy="240" r="3" fill="#915427"/>
  <circle cx="240" cy="240" r="3" fill="#915427"/>
</svg>