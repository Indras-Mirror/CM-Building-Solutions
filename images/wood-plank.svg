<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="plankGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4915C"/>
      <stop offset="30%" style="stop-color:#C4853F"/>
      <stop offset="70%" style="stop-color:#8B5A2B"/>
      <stop offset="100%" style="stop-color:#6B4423"/>
    </linearGradient>
    <pattern id="grainPattern" patternUnits="userSpaceOnUse" width="400" height="20">
      <path d="M0 5 Q100 2 200 5 T400 5" fill="none" stroke="#5C3D2E" stroke-width="0.5" opacity="0.3"/>
      <path d="M0 15 Q100 12 200 15 T400 15" fill="none" stroke="#5C3D2E" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>
  <!-- Main plank -->
  <rect x="10" y="10" width="380" height="80" rx="4" fill="url(#plankGrad)"/>
  <!-- Wood grain -->
  <rect x="10" y="10" width="380" height="80" rx="4" fill="url(#grainPattern)"/>
  <!-- Top highlight -->
  <rect x="10" y="10" width="380" height="15" rx="4" fill="#E8B882" opacity="0.3"/>
  <!-- Edge shadow -->
  <rect x="10" y="75" width="380" height="15" rx="4" fill="#3D2914" opacity="0.3"/>
  <!-- Knot details -->
  <ellipse cx="100" cy="50" rx="12" ry="8" fill="#5C3D2E" opacity="0.4"/>
  <ellipse cx="300" cy="45" rx="8" ry="6" fill="#5C3D2E" opacity="0.3"/>
</svg>