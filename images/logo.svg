<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4915C"/>
      <stop offset="50%" style="stop-color:#C4853F"/>
      <stop offset="100%" style="stop-color:#B87333"/>
    </linearGradient>
    <linearGradient id="darkWood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A2C1A"/>
      <stop offset="100%" style="stop-color:#2D1810"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="url(#woodGrad)"/>

  <!-- Wood grain texture lines -->
  <g opacity="0.1" stroke="#2D1810" stroke-width="1">
    <path d="M0 40 Q50 35 100 40 T200 40" fill="none"/>
    <path d="M0 80 Q50 75 100 80 T200 80" fill="none"/>
    <path d="M0 120 Q50 115 100 120 T200 120" fill="none"/>
    <path d="M0 160 Q50 155 100 160 T200 160" fill="none"/>
  </g>

  <!-- House icon -->
  <g transform="translate(50, 45)">
    <path d="M50 25 L10 55 L10 95 L90 95 L90 55 Z" fill="none" stroke="url(#darkWood)" stroke-width="4" stroke-linejoin="round"/>
    <path d="M50 25 L10 55 L50 35 L90 55" fill="none" stroke="url(#darkWood)" stroke-width="4" stroke-linecap="round"/>
    <rect x="35" y="65" width="30" height="30" fill="none" stroke="url(#darkWood)" stroke-width="4"/>
    <line x1="50" y1="65" x2="50" y2="95" stroke="url(#darkWood)" stroke-width="3"/>
  </g>

  <!-- C&M text -->
  <text x="100" y="170" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="url(#darkWood)" text-anchor="middle">C&M</text>
</svg>
